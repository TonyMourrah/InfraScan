<div class="vh-100 d-flex align-items-center justify-content-center bg-dark">
  <div class="card shadow-lg border-0" style="width: 25rem; border-radius: 15px;">
    <div class="card-body p-5">
      <div class="text-center mb-4">
        <i class="bi bi-person-plus text-success display-4"></i>
        <h2 class="fw-bold mt-2">Inscription</h2>
        <p class="text-muted small">Créer un profil inspecteur</p>
      </div>

      <form (ngSubmit)="onSignup()">
        <div class="mb-3">
          <label class="form-label small fw-bold text-uppercase">Identifiant</label>
          <div class="input-group">
            <span class="input-group-text bg-light border-end-0"><i class="bi bi-person"></i></span>
            <input type="text" 
                   name="username"
                   [(ngModel)]="user.username"
                   class="form-control bg-light border-start-0" 
                   placeholder="User"
                   required>
          </div>
        </div>

        <div class="mb-4">
          <label class="form-label small fw-bold text-uppercase">Mot de passe</label>
          <div class="input-group">
            <span class="input-group-text bg-light border-end-0"><i class="bi bi-lock"></i></span>
            <input type="password" 
                   name="password"
                   [(ngModel)]="user.passwordHash" 
                   class="form-control bg-light border-start-0" 
                   placeholder="••••••••"
                   required>
          </div>
        </div>

        <button type="submit" class="btn btn-success w-100 py-2 fw-bold shadow-sm mb-3">
          CRÉER MON COMPTE
        </button>

        <div class="text-center">
          <a routerLink="/login" class="text-decoration-none small text-info">
            Déjà inscrit ? Connectez-vous ici
          </a>
        </div>
      </form>
    </div>
  </div>
</div>
