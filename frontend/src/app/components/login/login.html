<div class="vh-100 d-flex align-items-center justify-content-center bg-dark">
  <div class="card shadow-lg border-0" style="width: 25rem; border-radius: 15px;">
    <div class="card-body p-5">
      <div class="text-center mb-4">
        <i class="bi bi-shield-check text-info display-4"></i>
        <h2 class="fw-bold mt-2">InfraScan</h2>
        <p class="text-muted small">Portail d'inspection</p>
      </div>

      <form (ngSubmit)="onLogin()">
  <div class="mb-3">
    <label class="form-label small fw-bold text-uppercase">Identifiant</label>
    <div class="input-group">
      <span class="input-group-text bg-light border-end-0"><i class="bi bi-person"></i></span>
      <input type="text" 
             name="username"
             [(ngModel)]="identifiant"
             class="form-control bg-light border-start-0" 
             placeholder="Username"
             required>
    </div>
  </div>

  <div class="mb-4">
  <label class="form-label small fw-bold text-uppercase">Mot de passe</label>
  <div class="input-group">
    <span class="input-group-text bg-light border-end-0"><i class="bi bi-lock"></i></span>
    <input type="password" 
           name="password"
           [(ngModel)]="motDePasse" 
           class="form-control bg-light border-start-0" 
           placeholder="••••••••">
  </div>
</div>

  <button type="submit" class="btn btn-primary w-100 py-2 fw-bold shadow-sm mb-3">
    SE CONNECTER
  </button>
  
  </form>

<div class="text-center mt-3">
  <p class="small text-muted">Pas encore de compte ? 
    <a routerLink="/signup" class="text-info fw-bold text-decoration-none">Créer un profil</a>
  </p>
</div>
    </div>
  </div>
</div>
